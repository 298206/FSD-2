<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var b = {
            "name": "Riya",
            // string
            "age": 20,
            // number
            "brnach": { "b1": "CST", "b2": "CSE" },
            // object
            "marks": [25, 40, 10],
            // array
            "ispresent": "true",
            // string
            "ispresent": true,
            // boolean
            "city": null
        }
        console.log(b.name)
        console.log(b["age"])
        console.log(b.brnach)
        console.log(b.brnach.b1)
        console.log(b["brnach"]["b2"])
        console.log(b.marks[2])
        console.log(b.ispresent)
        console.log(b.city)
    </script>
</head>

<body>
    <!-- Accessing values:-
                1. Dot notation = object.key
                2. Bracket notation = object["key"]
                3. nested object notation = object.key.key OR object["key"]["key"]
                4. Array inside JSON = object.array[index]-->
</body>

</html>
