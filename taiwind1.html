<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <button class="px-10 py-4 bg-black text-white my-11 mx-4 text-2xl hover:px-11 hover:py-5 
    hover:text-black hover:bg-white hover:border-2 hover:border-black rounded-md delay
    1000 transition-all duration-1000">Don't Touch me..</button>

    <div class="p-4 m-4"></div>
    <div class="w-32 m-auto h-32 rounded-full bg-blue-500 animate-bounce text-white p
    4">Bounce</div>
    <div class="w-32 m-auto h-32 bg-red-500 animate-spin text-white p-4">Spin</div>
    <div class="w-32 h-32 m-auto bg-green-500 animate-pulse text-white p-4">Pulse</div>
    <div class="p-5 m-5"></div>
    <div class="w-32 m-auto h-32 bg-purple-500 animate-ping text-white p-4">Ping</div>
</body>

</html>
