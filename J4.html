<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        student = { "sname": "Khushi", "sage": 18, "sbranch": "cst" }
        console.log(student)
        student.sname = "Riya"
        console.log(student)
        student["sage"] = 20
        console.log(student)
        let key = "sbranch"
        student[key] = "CE"
        console.log(student)
    </script>
</head>

<body>
    <!-- Updating values of exisiting object key:
        1. Dot notation := object.key = new value
        2. Bracket notation := object["key"] = new value
        3. using variable := object[key] = new value -->
</body>

</html>
