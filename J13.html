<!-- Intialize two variables and increment both the variables each time and display the addition of both 
 the variables at interval in 1 second.  -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <p id="p1"></p>
    <script>
        // a = 1
        // b = 2
        // setInterval(() => {
        //     console.log(a + b)
        //     a++
        //     b++
        // }, 1000)

        let a = 2, b = 5
        setInterval(() => { document.getElementById("p1").innerHTML = ++a + ++b }, 1000)
    </script>
</head>

</html>
